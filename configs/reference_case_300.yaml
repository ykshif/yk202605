# Reference case configuration for the 300 m x 60 m floating body.
#
# This file documents the current baseline. It is not yet consumed by the
# legacy scripts. Numerical results are expected to be unchanged by adding it.

case:
  id: reference_case_300
  description: 300 m x 60 m floating body, wavelength 300 m, direction 0 deg
  source_notebooks:
    - RODM_Static_checkmesh.ipynb
    - FEM_Reduce_v8 copy.ipynb
    - FEM_Reduce_v8_laptop.ipynb

geometry:
  length_m: 300
  width_m: 60
  mesh_label: 5m_x_5m
  total_nodes: 793
  nodes_per_row: 61
  retained_dofs_per_node: 5
  full_dofs_per_node: 6
  removed_dofs_zero_based: [5]
  master_node_rule:
    function: DM_Assemble.calculate_node_positions
    first_node: 424
    node_interval: 6
    count: 10

environment:
  wave:
    wavelength_m: 300
    direction_deg: 0

inputs:
  hydrodynamic_dataset: 'E:\phd\Code\DM-FEM2D\HydrodynamicData\Yoga\DM10_300_direction0.nc'
  structural_mass_matrix: 'E:\phd\Code\DM-FEM2D\StructureData\JobMesh5_5_MASS1.mtx'
  structural_stiffness_matrix: 'E:\phd\Code\DM-FEM2D\StructureData\JobMesh5_5_STIF1.mtx'
  experiment_heave_rao: 'E:\phd\Code\DM-FEM2D\data\Experiment_300_60\exp_300.txt'
  fu_2007_heave_rao: 'E:\phd\Code\DM-FEM2D\data\Experiment_300_60\fu_sim300.txt'

hydrodynamics:
  dataset: 'E:\phd\Code\DM-FEM2D\HydrodynamicData\Yoga\DM10_300_direction0.nc'
  hydrodynamic_nodes: 10
  hydrodynamic_dof_to_remove_zero_based: 5
  reverse_hydrodynamic_node_order: false

structure:
  mass_matrix: 'E:\phd\Code\DM-FEM2D\StructureData\JobMesh5_5_MASS1.mtx'
  stiffness_matrix: 'E:\phd\Code\DM-FEM2D\StructureData\JobMesh5_5_STIF1.mtx'
  mass_blend_beta: 0.0

reduction:
  method: SEREP
  retained_dofs_per_node: 5

solver:
  type: frequency_domain_mck
  use_hydrostatic: true
  frequency_index: 0

validation:
  baseline_response: displacement_55mesh_300.npy
  experiment_curve: 'E:\phd\Code\DM-FEM2D\data\Experiment_300_60\exp_300.txt'
  reference_curve: 'E:\phd\Code\DM-FEM2D\data\Experiment_300_60\fu_sim300.txt'
  expected_numerical_change: none

outputs:
  baseline_displacement: displacement_55mesh_300.npy
  comparison_figure_png: figures/reference_case_300_heave_vs_experiment.png
  comparison_figure_pdf: figures/reference_case_300_heave_vs_experiment.pdf

response_extraction:
  quantity: heave_rao
  physical_meaning: vertical displacement response amplitude operator along validation centerline
  response_shape: [3965, 1]
  centerline_slice_python: 'response[367*5-5:427*5-5, :]'
  heave_slice_python: 'midline[2::5, 0]'
  x_axis: normalized longitudinal coordinate x/L
  x_points: 60

baseline_metrics:
  heave_abs_min: 0.8166492461156475
  heave_abs_max: 1.2525429563334871
  heave_abs_mean: 0.896981533364751
  heave_abs_l2: 7.000919304253492
  rmse_vs_exp300: 0.06367482251124734
  rmse_vs_fu_sim300: 0.04488934895346538

